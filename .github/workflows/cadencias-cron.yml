name: Cadências Cron

on:
  schedule:
    - cron: '0 * * * *'  # toda hora cheia (UTC)
  workflow_dispatch:       # disparo manual pela UI do GitHub

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
      WEBHOOK_URL: https://walle.agendaedu.com/webhook/disparo_leads_eventos

    steps:
      - name: Executar cadências (delay-based)
        run: |
          set -e
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "=== Cadências Cron v2: $NOW ==="

          # Buscar cadências ativas
          CADENCIAS=$(curl -sf \
            "${SUPABASE_URL}/rest/v1/cadencias?ativo=eq.true&select=*" \
            -H "apikey: ${SUPABASE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_KEY}")

          COUNT=$(echo "$CADENCIAS" | jq 'length')
          echo "Cadências ativas: $COUNT"
          [ "$COUNT" = "0" ] && echo "Nenhuma cadência ativa." && exit 0

          echo "$CADENCIAS" | jq -c '.[]' | while read -r CAD; do
            ID=$(echo "$CAD" | jq -r '.id')
            NOME=$(echo "$CAD" | jq -r '.nome')
            DELAY_VALOR=$(echo "$CAD" | jq -r '.delay_valor')
            DELAY_UNIDADE=$(echo "$CAD" | jq -r '.delay_unidade')

            echo "--- Cadência: $NOME | delay: ${DELAY_VALOR} ${DELAY_UNIDADE}"

            # Calcular cutoff: leads criados há pelo menos DELAY atrás são elegíveis
            if [ "$DELAY_UNIDADE" = "horas" ]; then
              CUTOFF=$(date -u -d "${DELAY_VALOR} hours ago" +"%Y-%m-%dT%H:%M:%SZ")
            else
              CUTOFF=$(date -u -d "${DELAY_VALOR} days ago" +"%Y-%m-%dT%H:%M:%SZ")
            fi
            echo "  Cutoff (leads criados antes de): $CUTOFF"

            # Buscar leads já enviados para esta cadência
            ENVIADOS=$(curl -sf \
              "${SUPABASE_URL}/rest/v1/cadencias_leads?cadencia_id=eq.${ID}&select=lead_id" \
              -H "apikey: ${SUPABASE_KEY}" \
              -H "Authorization: Bearer ${SUPABASE_KEY}")
            ENVIADOS_IDS=$(echo "$ENVIADOS" | jq '[.[].lead_id]')
            ENVIADOS_COUNT=$(echo "$ENVIADOS_IDS" | jq 'length')
            echo "  Já enviado para $ENVIADOS_COUNT lead(s)"

            # Buscar leads elegíveis (criados antes do cutoff), paginado
            ALL_LEADS="[]"
            OFFSET=0
            while true; do
              PAGE=$(curl -sf \
                "${SUPABASE_URL}/rest/v1/leads?select=id,nome,telefone,email,nome_escola,stage,estado,origem,nivel_interesse,ja_e_cliente&created_at=lte.${CUTOFF}&limit=1000&offset=${OFFSET}" \
                -H "apikey: ${SUPABASE_KEY}" \
                -H "Authorization: Bearer ${SUPABASE_KEY}")
              PAGE_LEN=$(echo "$PAGE" | jq 'length')
              ALL_LEADS=$(printf '%s\n%s' "$ALL_LEADS" "$PAGE" | jq -s 'add')
              [ "$PAGE_LEN" -lt 1000 ] && break
              OFFSET=$((OFFSET + 1000))
            done

            # Remover leads que já receberam esta cadência
            ALL_LEADS=$(echo "$ALL_LEADS" | jq --argjson enviados "$ENVIADOS_IDS" \
              '[.[] | select(.id as $id | $enviados | index($id) == null)]')

            # Filtro por segmento (= origem do lead)
            SEG_IDS=$(echo "$CAD" | jq '.segmento_ids // []')
            if [ "$(echo "$SEG_IDS" | jq 'length')" -gt 0 ]; then
              ALL_LEADS=$(echo "$ALL_LEADS" | jq --argjson segs "$SEG_IDS" \
                '[.[] | select(.origem as $o | $segs | index($o) != null)]')
            fi

            QTDE=$(echo "$ALL_LEADS" | jq 'length')
            echo "  Leads elegíveis: $QTDE"

            if [ "$QTDE" = "0" ]; then
              echo "  Nenhum lead novo elegível."
              continue
            fi

            # Montar payload do webhook
            SEG_STR=$(echo "$SEG_IDS" | jq -r 'if length > 0 then join(",") else "todas as origens" end')

            PAYLOAD=$(jq -n \
              --arg tn "$(echo "$CAD" | jq -r '.template_nome')" \
              --arg tc "$(echo "$CAD" | jq -r '.template_corpo // ""')" \
              --argjson hi "$(echo "$CAD" | jq '.has_image // false')" \
              --arg iu "$(echo "$CAD" | jq -r '.image_url // ""')" \
              --arg seg "$SEG_STR" \
              --arg tels "$(echo "$ALL_LEADS" | jq -r '[.[].telefone] | join(",")')" \
              --argjson leads "$(echo "$ALL_LEADS" | jq '[.[] | {id,nome,telefone,email,nomeEscola:.nome_escola,stage,estado}]')" \
              '{template_nome:$tn,template_corpo:$tc,has_image:$hi,image_url:$iu,segmento:$seg,telefones:$tels,leads:$leads}')

            HTTP_STATUS=$(curl -s -o /tmp/wh_resp.txt -w "%{http_code}" \
              -X POST "${WEBHOOK_URL}" \
              -H "Content-Type: application/json" \
              -d "$PAYLOAD")

            echo "  Webhook: HTTP $HTTP_STATUS"

            if [[ "$HTTP_STATUS" =~ ^2 ]]; then
              # Registrar envio para cada lead (bulk insert)
              BULK=$(echo "$ALL_LEADS" | jq --arg cid "$ID" \
                '[.[] | {cadencia_id: $cid, lead_id: .id}]')
              curl -sf -X POST \
                "${SUPABASE_URL}/rest/v1/cadencias_leads" \
                -H "apikey: ${SUPABASE_KEY}" \
                -H "Authorization: Bearer ${SUPABASE_KEY}" \
                -H "Content-Type: application/json" \
                -H "Prefer: return=minimal" \
                -d "$BULK" > /dev/null \
                && echo "  $QTDE envio(s) registrado(s) em cadencias_leads." \
                || echo "  Aviso: falha ao registrar envios."
            else
              echo "  Webhook falhou ($HTTP_STATUS). Envios NÃO registrados."
            fi
          done

          echo "=== Cadências concluídas ==="
